version: '3.9'

services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_LOGIN:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-gopherledger}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  gopher-app:
    build: .
    env_file:
      - .env
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    ports:
      - "80:80"
    depends_on:
      gopher-app:
        condition: service_started
    restart: on-failure

volumes:
  pg_data:

networks:
  backend:
    internal: true
  frontend: